name: Daily Meal Deduction

on:
  schedule:
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * *'

  workflow_dispatch:

jobs:
  deduct:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Meal Deduction

        run: |
          curl -X POST https://mealora-app.onrender.com/scheduler-api/deduct
